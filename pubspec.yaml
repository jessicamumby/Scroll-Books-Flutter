name: scroll_books
description: Scroll Books — the classic library, one chunk at a time.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.0
  go_router: ^13.2.0
  http: ^1.2.1
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  share_plus: ^9.0.0
  flutter_dotenv: ^5.1.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - .env
